name: Build GDAL Libs

on:
  workflow_dispatch:
    inputs:
      gdal_tag:
        description: "GDAL tag to build (e.g., v3.13.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux-x64
            runner: ubuntu-latest
          - name: linux-arm64
            runner: ubuntu-24.04-arm
          - name: macos-arm64
            runner: macos-latest
          - name: windows-x64
            runner: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euxo pipefail

          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y \
              ant \
              cmake \
              ninja-build \
              swig \
              proj-bin \
              libproj-dev
          elif [[ "${RUNNER_OS}" == "macOS" ]]; then
            brew update
            brew install ant cmake ninja proj swig
          fi

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y ant cmake ninja swig

      - name: Install PROJ with vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          if (-not $vcpkgRoot) {
            $vcpkgRoot = "$env:RUNNER_TEMP\vcpkg"
          }

          if (-not (Test-Path $vcpkgRoot)) {
            git clone https://github.com/microsoft/vcpkg $vcpkgRoot
          }

          $vcpkgExe = Join-Path $vcpkgRoot "vcpkg.exe"
          if (-not (Test-Path $vcpkgExe)) {
            & (Join-Path $vcpkgRoot "bootstrap-vcpkg.bat") -disableMetrics
          }

          & $vcpkgExe install proj:x64-windows sqlite3[rtree]:x64-windows

          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VCPKG_INSTALLED=$vcpkgRoot\installed\x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Append

          $projLib = "$vcpkgRoot\installed\x64-windows\lib\proj.lib"
          $projInclude = "$vcpkgRoot\installed\x64-windows\include\proj.h"
          if (-not (Test-Path $projLib)) {
            throw "PROJ library not found at $projLib after vcpkg install"
          }
          if (-not (Test-Path $projInclude)) {
            throw "PROJ header not found at $projInclude after vcpkg install"
          }

      - name: Setup MSVC developer environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Validate version supports CMake
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ inputs.gdal_tag }}"
          VERSION="${VERSION#v}"
          if [[ "$(printf '%s\n' "$VERSION" "3.5.0" | sort -V | head -n1)" != "3.5.0" ]]; then
            echo "GDAL tag ${{ inputs.gdal_tag }} is older than 3.5.0."
            echo "This workflow currently supports CMake builds for GDAL >= 3.5.0 only."
            exit 1
          fi

      - name: Download GDAL source
        shell: bash
        run: |
          set -euxo pipefail
          VERSION="${{ inputs.gdal_tag }}"
          VERSION="${VERSION#v}"
          ARCHIVE="gdal-${VERSION}.tar.gz"
          URL="https://github.com/OSGeo/gdal/releases/download/${{ inputs.gdal_tag }}/${ARCHIVE}"

          curl -fL "$URL" -o "$ARCHIVE"
          tar -xzf "$ARCHIVE"
          echo "GDAL_SOURCE_DIR=${GITHUB_WORKSPACE}/gdal-${VERSION}" >> "$GITHUB_ENV"

      - name: Configure and build (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euxo pipefail

          BUILD_DIR="${GITHUB_WORKSPACE}/build"
          INSTALL_DIR="${GITHUB_WORKSPACE}/install"
          mkdir -p "$BUILD_DIR" "$INSTALL_DIR"

          EXTRA_ARGS=()
          if [[ "${RUNNER_OS}" == "macOS" ]]; then
            EXTRA_ARGS+=("-DCMAKE_PREFIX_PATH=$(brew --prefix proj)")
          fi

          cmake -S "$GDAL_SOURCE_DIR" -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$INSTALL_DIR" \
            -DBUILD_TESTING=OFF \
            -DBUILD_APPS=OFF \
            -DBUILD_PYTHON_BINDINGS=OFF \
            -DBUILD_JAVA_BINDINGS=ON \
            -DBUILD_CSHARP_BINDINGS=OFF \
            -DGDAL_JAVA_INSTALL_DIR=share/java \
            -DGDAL_JAVA_JNI_INSTALL_DIR=lib/jni \
            "${EXTRA_ARGS[@]}"

          cmake --build "$BUILD_DIR" --config Release --parallel
          cmake --install "$BUILD_DIR" --config Release

      - name: Stage runtime data (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euxo pipefail

          INSTALL_DIR="${GITHUB_WORKSPACE}/install"
          mkdir -p "${INSTALL_DIR}/share"

          PROJ_DATA_SOURCE=""
          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            if [[ -d "/usr/share/proj" ]]; then
              PROJ_DATA_SOURCE="/usr/share/proj"
            fi
          elif [[ "${RUNNER_OS}" == "macOS" ]]; then
            BREW_PROJ_PREFIX="$(brew --prefix proj)"
            if [[ -d "${BREW_PROJ_PREFIX}/share/proj" ]]; then
              PROJ_DATA_SOURCE="${BREW_PROJ_PREFIX}/share/proj"
            fi
          fi

          if [[ -z "${PROJ_DATA_SOURCE}" ]]; then
            echo "Unable to locate PROJ data directory on ${RUNNER_OS}."
            exit 1
          fi

          rm -rf "${INSTALL_DIR}/share/proj"
          mkdir -p "${INSTALL_DIR}/share/proj"
          cp -a "${PROJ_DATA_SOURCE}/." "${INSTALL_DIR}/share/proj/"

          if [[ ! -d "${INSTALL_DIR}/share/gdal" ]]; then
            mkdir -p "${INSTALL_DIR}/share/gdal"
            cp -a "${GDAL_SOURCE_DIR}/data/." "${INSTALL_DIR}/share/gdal/"
          fi

      - name: Configure and build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          $buildDir = "$env:GITHUB_WORKSPACE\build"
          $installDir = "$env:GITHUB_WORKSPACE\install"
          New-Item -ItemType Directory -Force -Path $buildDir | Out-Null
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null

          $cmakeArgs = @(
            "-S", "$env:GDAL_SOURCE_DIR",
            "-B", $buildDir,
            "-G", "Ninja",
            "-DCMAKE_BUILD_TYPE=Release",
            "-DCMAKE_INSTALL_PREFIX=$installDir",
            "-DBUILD_TESTING=OFF",
            "-DBUILD_APPS=OFF",
            "-DBUILD_PYTHON_BINDINGS=OFF",
            "-DBUILD_JAVA_BINDINGS=ON",
            "-DBUILD_CSHARP_BINDINGS=OFF",
            "-DGDAL_JAVA_INSTALL_DIR=share/java",
            "-DGDAL_JAVA_JNI_INSTALL_DIR=lib/jni",
            "-DPROJ_INCLUDE_DIR=$env:VCPKG_INSTALLED\include",
            "-DPROJ_LIBRARY=$env:VCPKG_INSTALLED\lib\proj.lib",
            "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake",
            "-DVCPKG_TARGET_TRIPLET=x64-windows"
          )

          cmake @cmakeArgs
          cmake --build $buildDir --config Release --parallel
          cmake --install $buildDir --config Release

      - name: Stage runtime data (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $installDir = "$env:GITHUB_WORKSPACE\install"
          $projDataSource = "$env:VCPKG_INSTALLED\share\proj"
          $projDataTarget = "$installDir\share\proj"
          $gdalDataTarget = "$installDir\share\gdal"
          $gdalDataSource = "$env:GDAL_SOURCE_DIR\data"

          if (-not (Test-Path $projDataSource)) {
            throw "PROJ data directory not found at $projDataSource"
          }

          New-Item -ItemType Directory -Force -Path "$installDir\share" | Out-Null
          if (Test-Path $projDataTarget) {
            Remove-Item -LiteralPath $projDataTarget -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $projDataTarget | Out-Null
          Copy-Item -Path "$projDataSource\*" -Destination $projDataTarget -Recurse -Force

          if (-not (Test-Path $gdalDataTarget)) {
            if (-not (Test-Path $gdalDataSource)) {
              throw "GDAL data source directory not found at $gdalDataSource"
            }
            New-Item -ItemType Directory -Force -Path $gdalDataTarget | Out-Null
            Copy-Item -Path "$gdalDataSource\*" -Destination $gdalDataTarget -Recurse -Force
          }

      - name: Package native libs (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist
          INSTALL_DIR="${GITHUB_WORKSPACE}/install"
          PACKAGE_DIR="${GITHUB_WORKSPACE}/package"

          if [[ ! -d "${INSTALL_DIR}" ]]; then
            echo "Expected install directory to exist, but it was not found."
            exit 1
          fi

          rm -rf "${PACKAGE_DIR}"
          mkdir -p "${PACKAGE_DIR}/lib" "${PACKAGE_DIR}/share"

          if [[ ! -d "${INSTALL_DIR}/lib" ]]; then
            echo "Expected install/lib to exist, but it was not found."
            exit 1
          fi

          if [[ ! -d "${INSTALL_DIR}/share" ]]; then
            echo "Expected install/share to exist, but it was not found."
            exit 1
          fi

          cp -a "${INSTALL_DIR}/lib/." "${PACKAGE_DIR}/lib/"
          cp -a "${INSTALL_DIR}/share/." "${PACKAGE_DIR}/share/"

          rm -rf "${PACKAGE_DIR}/share/bash-completion" "${PACKAGE_DIR}/share/man"
          if [[ "${RUNNER_OS}" == "macOS" ]] && [[ -d "${PACKAGE_DIR}/share/proj" ]]; then
            find "${PACKAGE_DIR}/share/proj" -type f -name "*.tif" -delete
          fi

          ARCHIVE="gdal-${{ inputs.gdal_tag }}-${{ matrix.platform.name }}.tar.gz"
          tar -C "${PACKAGE_DIR}" -czf "dist/${ARCHIVE}" lib share

      - name: Package native libs (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $installDir = "$env:GITHUB_WORKSPACE\install"
          $distDir = "$env:GITHUB_WORKSPACE\dist"
          $packageDir = "$env:GITHUB_WORKSPACE\package"

          New-Item -ItemType Directory -Force -Path $distDir | Out-Null
          if (-not (Test-Path $installDir)) {
            throw "Expected install directory to exist, but it was not found."
          }

          if (Test-Path $packageDir) {
            Remove-Item -LiteralPath $packageDir -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path "$packageDir\lib" | Out-Null
          New-Item -ItemType Directory -Force -Path "$packageDir\share" | Out-Null

          if (-not (Test-Path "$installDir\share")) {
            throw "Expected install\\share to exist, but it was not found."
          }

          if (Test-Path "$installDir\lib") {
            Copy-Item -Path "$installDir\lib\*" -Destination "$packageDir\lib" -Recurse -Force
          }
          if (Test-Path "$installDir\bin") {
            Copy-Item -Path "$installDir\bin\*" -Destination "$packageDir\lib" -Recurse -Force
          }

          Copy-Item -Path "$installDir\share\*" -Destination "$packageDir\share" -Recurse -Force
          Remove-Item -LiteralPath "$packageDir\share\bash-completion" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath "$packageDir\share\man" -Recurse -Force -ErrorAction SilentlyContinue

          $archive = "gdal-${{ inputs.gdal_tag }}-${{ matrix.platform.name }}.zip"
          Compress-Archive -Path "$packageDir\lib", "$packageDir\share" -DestinationPath "$distDir\$archive" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: gdal-${{ inputs.gdal_tag }}-${{ matrix.platform.name }}
          path: dist/*
          if-no-files-found: error

  reset-release-tag:
    name: Reset existing release/tag
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Delete existing release and tag if present
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euxo pipefail
          TAG="${{ inputs.gdal_tag }}"

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag
          else
            echo "No existing release for ${TAG}"
          fi

  publish:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: reset-release-tag
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: gdal-${{ inputs.gdal_tag }}-*
          merge-multiple: true
          path: dist

      - name: Publish assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euxo pipefail
          TAG="${{ inputs.gdal_tag }}"
          TITLE="GDAL Native Libs ${TAG}"

          gh release create "$TAG" dist/* --repo "$GITHUB_REPOSITORY" --title "$TITLE" --notes "Automated GDAL native library build for ${TAG}"
